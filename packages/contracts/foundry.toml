[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"

[rpc_endpoints]
gensyn_testnet = "https://gensyn-testnet.g.alchemy.com/public"
gensyn_mainnet = "https://gensyn-mainnet.g.alchemy.com/public"

[etherscan]
# Blockscout explorers — add API keys via env if/when supported.
