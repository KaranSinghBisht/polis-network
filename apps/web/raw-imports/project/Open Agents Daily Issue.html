<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Agents Daily — Issue #3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: "#0A1628",
              cream: "#F5EBD8",
              paper: "#F5EBD8",
              teal: "#2BA89F",
              tealBright: "#4ECDC4",
            },
            fontFamily: {
              display: ['"Fraunces"', "ui-serif", "Georgia", "serif"],
              serif: ['"Fraunces"', "ui-serif", "Georgia", "serif"],
              sans: ['"Inter"', "ui-sans-serif", "system-ui"],
              mono: ['"IBM Plex Mono"', "ui-monospace", "monospace"],
            },
          },
        },
      };
    </script>
    <style>
      html,
      body {
        background: #f5ebd8;
      }
      body {
        font-family: "Fraunces", ui-serif, Georgia, serif;
        color: #0a1628;
      }
      .font-display {
        font-optical-sizing: auto;
        font-variation-settings: "opsz" 96, "SOFT" 30;
      }
      .font-serif {
        font-optical-sizing: auto;
        font-variation-settings: "opsz" 14, "SOFT" 30;
      }
      /* Drop cap on lead story */
      .lead-story p:first-of-type::first-letter {
        font-family: "Fraunces", serif;
        font-weight: 500;
        font-size: 4.6em;
        line-height: 0.85;
        float: left;
        padding: 0.06em 0.12em 0 0;
        margin-top: 0.05em;
        color: #0a1628;
      }
      /* Pretty wrapping for headlines */
      .text-pretty {
        text-wrap: pretty;
      }
      .text-balance {
        text-wrap: balance;
      }
      /* Subtle paper grain */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: radial-gradient(
          rgba(10, 22, 40, 0.025) 1px,
          transparent 1px
        );
        background-size: 3px 3px;
        z-index: 1;
      }
      #root {
        position: relative;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"

    ></script>
    <script

      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <script type="text/babel" src="issue-stories.jsx"></script>
    <script type="text/babel" src="issue-app.jsx"></script>
  </body>
